            padding: 0;

            font-family: 'Poppins', sans-serif;

        }

        body {

            gap: 5px;
            padding: 5px;
        }

        .menu-dot {

            height: 5px;
            background-color: var(--primary);
            border-radius: 50%;

        .menu {

            top: 70px;
            right: 20px;
            background-color: white;
            border-radius: 10px;
            box-shadow: var(--shadow);
            padding: 15px;

            gap: 10px;

            height: 3px;

        .categories::-webkit-scrollbar-track {

            font-size: 14px;
            font-weight: 500;

        .game-iframe {
            width: 100%;
            height: calc(100% - 60px);
            border: none;
            background-color: #f0f0f0;

        .loading-overlay {

            top: 60px;
            left: 0;

            left: 0;

            from { opacity: 0; }
            to { opacity: 1; }

            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }

        // Elementos del DOM
        const gamesGrid = document.getElementById('games-grid');
        const searchInput = document.getElementById('search-input');
        const searchBtn = document.getElementById('search-btn');
        const categories = document.querySelectorAll('.category');
        const gameViewer = document.getElementById('game-viewer');
        const gameIframe = document.getElementById('game-iframe');
        const viewerTitle = document.getElementById('viewer-title');
        const viewerClose = document.getElementById('viewer-close');
        const overlay = document.getElementById('overlay');
        const loadingOverlay = document.getElementById('loading-overlay');
        const skipBtn = document.getElementById('skip-btn');
        const menuBtn = document.getElementById('menu-btn');
        const menu = document.getElementById('menu');
        const liveBtn = document.getElementById('live-btn');
        const whatIsBtn = document.getElementById('what-is');
        const goToLiveBtn = document.getElementById('go-to-live');
        const goToCoinsBtn = document.getElementById('go-to-coins');

        // Mostrar juegos
        function displayGames(gamesToShow) {
            gamesGrid.innerHTML = '';
            
            if (gamesToShow.length === 0) {
                gamesGrid.innerHTML = '<p style="grid-column:1/-1;text-align:center;padding:2rem;color:#666;">No se encontraron juegos</p>';
                return;
            }
            
            gamesToShow.forEach(game => {
                const gameCard = document.createElement('div');
                gameCard.className = 'game-card';
                gameCard.dataset.category = game.category;
                
                gameCard.innerHTML = `
                    <img src="${game.thumbnail}" alt="${game.title}" class="game-thumbnail" onerror="this.src='https://via.placeholder.com/300x150/7b1fa2/ffffff?text=${encodeURIComponent(game.title)}'">
                    <div class="game-info">
                        <div class="game-title">${game.title}</div>
                        <div class="game-description">${game.description}</div>
                        <div class="game-actions">
                            <button class="btn btn-primary" data-url="${game.url}" data-title="${game.title}">
                                <i class="fas fa-play"></i> Jugar
                            </button>
                            <button class="btn btn-secondary" data-url="${game.url}" data-title="${game.title}">
                                <i class="fas fa-expand"></i> Pantalla
                            </button>
                        </div>
                    </div>
                `;
                
                gamesGrid.appendChild(gameCard);
            });
            
            // Configurar botones de juego
            setupGameButtons();
        }

        // Configurar botones de juego
        function setupGameButtons() {
            document.querySelectorAll('.btn-primary').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const url = e.target.closest('button').getAttribute('data-url');
                    const title = e.target.closest('button').getAttribute('data-title');
                    openGameViewer(url, title, false);
                });
            });
            
            document.querySelectorAll('.btn-secondary').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const url = e.target.closest('button').getAttribute('data-url');
                    const title = e.target.closest('button').getAttribute('data-title');
                    openGameViewer(url, title, true);
                });
            });
        }

        // Abrir visor de juego
        function openGameViewer(url, title, fullscreen) {
            viewerTitle.textContent = title;
            gameViewer.style.display = 'flex';
            overlay.style.display = 'block';
            loadingOverlay.style.display = 'flex';
            
            // Cargar el iframe después de un breve retraso
            setTimeout(() => {
                gameIframe.src = url;
                loadingOverlay.style.display = 'none';
                
                // Ocultar footer de Crazy Games
                hideCrazyGamesFooter();
                
                // Pantalla completa si se solicitó
                if (fullscreen && window.innerWidth > 768) {
                    gameViewer.requestFullscreen().catch(err => {
                        console.error('Error al intentar pantalla completa:', err);
                    });
                }
            }, 1500);
        }

        // Ocultar footer de Crazy Games
        function hideCrazyGamesFooter() {
            const style = document.createElement('style');
            style.innerHTML = `
                iframe.game-iframe {
                    margin-bottom: -50px !important;
                    overflow: hidden !important;
                }
                
                iframe.game-iframe body > div:last-child,
                iframe.game-iframe #footer,
                iframe.game-iframe .footer,
                iframe.game-iframe .crazygames-footer {
                    display: none !important;
                    height: 0 !important;
                    visibility: hidden !important;
                }
                
                iframe.game-iframe #game-container {
                    padding-bottom: 0 !important;
                    margin-bottom: 0 !important;
                }
            `;
            document.head.appendChild(style);
        }

        // Cerrar visor de juego
        function closeGameViewer() {
            gameIframe.src = '';
            gameViewer.style.display = 'none';
            overlay.style.display = 'none';
            
            // Salir de pantalla completa si está activa
            if (document.fullscreenElement) {
                document.exitFullscreen();
            }
        }

        // Filtrar juegos por categoría
        function filterByCategory(category) {
            if (category === 'all') {
                displayGames(games);
            } else {
                const filteredGames = games.filter(game => game.category === category);
                displayGames(filteredGames);
            }
        }

        // Buscar juegos
        function searchGames() {
            const searchTerm = searchInput.value.toLowerCase().trim();
            if (searchTerm === '') {
                displayGames(games);
                return;
            }
            
            const filteredGames = games.filter(game => 
                game.title.toLowerCase().includes(searchTerm) || 
                game.description.toLowerCase().includes(searchTerm)
            );
            
            displayGames(filteredGames);
        }

        // Alternar menú
        function toggleMenu() {
            menu.classList.toggle('active');
        }

        // Redirigir al live de TikTok
        function goToLive() {
            window.location.href = 'tusinimonedas.html';
        }

        // Redirigir a Tusini Monedas
        function goToCoins() {
            window.location.href = 'tusini-monedas.html';
        }

        // Mostrar información sobre TusiniTusineli
        function showWhatIs() {
            alert('TusiniTusineli.com es una plataforma de juegos gratis online donde también puedes interactuar en el live de Periquini Loquini en TikTok.');
        }

        // Event listeners
        categories.forEach(category => {
            category.addEventListener('click', () => {
                categories.forEach(c => c.classList.remove('active'));
                category.classList.add('active');
                filterByCategory(category.dataset.category);
            });
        });

        searchBtn.addEventListener('click', searchGames);
        searchInput.addEventListener('keyup', (e) => {
            if (e.key === 'Enter') {
                searchGames();
            }
        });

        viewerClose.addEventListener('click', closeGameViewer);
        overlay.addEventListener('click', closeGameViewer);
        skipBtn.addEventListener('click', () => {
            loadingOverlay.style.display = 'none';
        });

        menuBtn.addEventListener('click', toggleMenu);
        liveBtn.addEventListener('click', goToLive);
        goToLiveBtn.addEventListener('click', goToLive);
        goToCoinsBtn.addEventListener('click', goToCoins);
        whatIsBtn.addEventListener('click', showWhatIs);

        // Cerrar menú al hacer clic fuera
        document.addEventListener('click', (e) => {
            if (!menu.contains(e.target) && e.target !== menuBtn) {
                menu.classList.remove('active');
            }
        });

        // Manejar cambios de pantalla completa
        document.addEventListener('fullscreenchange', () => {
            if (!document.fullscreenElement) {
                gameViewer.style.width = '100%';
                gameViewer.style.height = '100%';
            }
        });

        // Inicializar
        displayGames(games);
    </script>
</body>
</html>
