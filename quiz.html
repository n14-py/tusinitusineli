<script>
  const BACKEND = 'https://tusini.glitch.me/'; // URL pública de Glitch

  function reproducirVideo(url) {
    fetch(`${BACKEND}/api/video`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video: url })
    });
  }

  function volverAPng() {
    fetch(`${BACKEND}/api/reset`, { method: 'POST' });
  }
</script>

<button onclick="reproducirVideo('https://cdn.glitch.global/4fe52089-bb45-4dcf-9012-fc1190060bb8/WhatsApp%20Video%202025-05-04%20at%207.55.05%20PM.mp4?v=1749809761196')">Reproducir Video</button>
<button onclick="volverAPng()">Volver a PNnG</button>
