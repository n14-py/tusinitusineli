<script>
  const BACKEND = 'https://tusini.glitch.me/'; // URL pública de Glitch

  function reproducirVideo(url) {
    fetch(`${BACKEND}/api/video`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ video: url })
    });
  }

  function volverAPng() {
    fetch(`${BACKEND}/api/reset`, { method: 'POST' });
  }
</script>

<button onclick="reproducirVideo('https://cdn.glitch.global/tu-video-1.mp4')">Reproducir Video</button>
<button onclick="volverAPng()">Volver a PNG</button>
